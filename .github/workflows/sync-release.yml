name: Sync Releases

on:
  workflow_dispatch:   # 仅手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Sync latest release
        run: |
          UPSTREAM="oneclickvirt/gostun"
          FORK="beck023/gostun"

          # 获取最新 release 的 tag
          TAG=$(gh release list -R $UPSTREAM --limit 1 --json tagName --jq '.[0].tagName')
          echo "最新 release tag: $TAG"

          # 下载 release 文件
          mkdir -p release_assets
          gh release download $TAG -R $UPSTREAM --dir release_assets

          # 如果 fork 已经有这个 release，就先删除再创建
          if gh release view $TAG -R $FORK >/dev/null 2>&1; then
            echo "Fork 已存在该 release，先删除"
            gh release delete $TAG -R $FORK -y
          fi

          # 创建 release
          gh release create $TAG release_assets/* \
            -R $FORK \
            --title "$TAG" \
            --notes "同步自 $UPSTREAM"
